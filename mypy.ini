[mypy]
python_version = 3.14
warn_return_any = True
warn_unused_configs = True

# Progressive type checking: enabled for critical modules
# Recommended order: utils -> git_flow -> git_manage -> role skills
disallow_untyped_defs = False
disallow_incomplete_defs = False
check_untyped_defs = True
disallow_untyped_decorators = False
disallow_any_generics = False
warn_redundant_casts = True
warn_unused_ignores = True
warn_no_return = True
strict_equality = True
ignore_missing_imports = True
show_error_context = True
show_column_numbers = True
pretty = True

# Test files remain relaxed
[mypy-tests.*]
disallow_untyped_defs = False

# Critical utility modules with strict type checking
[mypy-utils.audit_logger]
disallow_untyped_defs = True
disallow_incomplete_defs = True

[mypy-utils.file_lock]
disallow_untyped_defs = True
disallow_incomplete_defs = True

[mypy-utils.input_sanitizer]
disallow_untyped_defs = True
disallow_incomplete_defs = True

[mypy-utils.exceptions]
disallow_untyped_defs = True
disallow_incomplete_defs = True

[mypy-utils.constants]
disallow_untyped_defs = True
disallow_incomplete_defs = True

# Other utils modules remain relaxed for now
[mypy-utils.*]
disallow_untyped_defs = False

[mypy-git_flow.*]
disallow_untyped_defs = False

[mypy-git_manage.*]
disallow_untyped_defs = False